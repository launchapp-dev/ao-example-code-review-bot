mcp_servers:
  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "."
    env: {}

  github:
    command: npx
    args:
      - "-y"
      - "gh-cli-mcp"
    env:
      GH_TOKEN: "${GH_TOKEN}"

  sequential-thinking:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-sequential-thinking"
    env: {}
